<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>melodify_website</title>
    <link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <header>
        <h1>Welcome to Melodify websitezz!</h1>
    </header>
    <main>
        <p>This is the main content of our website.</p>
    </main>
    <section id="checkout">
      <h2>Checkout</h2>
      <form id="checkout-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="card-number">Card number</label>
          <input type="text" id="card-number" name="card-number" inputmode="numeric"
                 maxlength="19" placeholder="1234 5678 9012 3456" autocomplete="cc-number" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="expiry">Expiry</label>
            <input type="text" id="expiry" name="expiry" placeholder="MM / YY" maxlength="7" autocomplete="cc-exp" />
          </div>
          <div class="form-group">
            <label for="cvv">CVV</label>
            <input type="text" id="cvv" name="cvv" inputmode="numeric" maxlength="4" placeholder="123" autocomplete="cc-csc" />
          </div>
        </div>
        <ul id="cart-errors" hidden></ul>
        <button type="submit" id="checkout-btn">Pay now</button>
      </form>

      <div id="checkout-success" hidden>
        <div class="success-icon">✓</div>
        <h3>Payment successful!</h3>
        <p>Thanks for your order. A confirmation will be sent to your email.</p>
        <button id="checkout-restart">Place another order</button>
      </div>
    </section>

    <footer>
        <p>&copy; 2026 melodify_website</p>
    </footer>
    <script src="js/main.js"></script>
</body>
</html>
